name: Gerar APK Android

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Baixar arquivos do repositório
        uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libltdl-dev autoconf libtool

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython virtualenv

      - name: Compilar APK
        run: buildozer android debug

      - name: Salvar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: InspecaoAterro-APK
          path: bin/*.apk
          retention-days: 30
