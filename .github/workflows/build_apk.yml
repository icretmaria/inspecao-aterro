name: Gerar APK Android
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Compilar APK com Docker
        run: |
          docker run --rm \
            --user root \
            --volume ${{ github.workspace }}:/home/user/hostcwd \
            kivy/buildozer:stable \
            android debug 2>&1 | tee build.log || true
          echo "=== ERROS ==="
          grep -i "error\|failed" build.log | tail -30 || true
          echo "=== APK ==="
          find . -name "*.apk" 2>/dev/null || echo "Nenhum APK"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: InspecaoAterro-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
