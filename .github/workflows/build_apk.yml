name: Gerar APK Android
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar dependências
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git zip unzip openjdk-17-jdk \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscave-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libltdl-dev autoconf libtool
          pip install --upgrade pip
          pip install buildozer cython virtualenv
          pip install git+https://github.com/kivy/python-for-android.git@develop
      - name: Compilar APK
        run: buildozer android debug 2>&1 | tee build.log; tail -50 build.log
      - name: Mostrar erros
        if: always()
        run: grep -i "error\|failed" build.log | tail -30 || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: InspecaoAterro-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
